#:schema https://mago.carthage.software/1.30.0/schema.json
version = "1"
php-version = "8.1"

[source]
paths = ["src", "tests"]
includes = ["vendor"]

[source.glob]
literal-separator = true

[analyzer]
check-missing-type-hints = true
check-missing-override = true
find-unused-parameters = true
find-overly-wide-return-types = true
enforce-class-finality = true
ignore = [
    { code = "enforce-class-finality", in = ["tests/"] },
    { code = "missing-property-type", in = ["src/Client.php", "src/Transport/StdioTransport.php"] },
    { code = "missing-return-type", in = ["src/Transport/StdioTransport.php"] },
    { code = "mixed-assignment", in = ["src/", "tests/"] },
]

[linter]
integrations = ["phpunit"]

[linter.rules.cyclomatic-complexity]
enabled = false

[linter.rules.excessive-parameter-list]
enabled = false

[linter.rules.halstead]
enabled = false

[linter.rules.kan-defect]
enabled = false

[linter.rules.no-boolean-flag-parameter]
enabled = false

[linter.rules.too-many-methods]
enabled = false

[linter.rules.too-many-properties]
enabled = false

[formatter]
